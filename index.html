<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khởi tạo quy trình</title>
  <style>
    :root {
      --navy: #10284f;
      --navy-2: #16365f;
      --sky: #8eacc7;
      --page: #f1f7fb;
      --rail: #f8fbfd;
      --line: #dbe5ec;
      --text: #3f4f5e;
      --muted: #8291a0;
      --active: #c87072;
      --gold: #d2d546;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: #eaf1f5;
      color: var(--text);
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 1120px;
      min-height: 620px;
      background: var(--page);
      border: 1px solid #121212;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.28);
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 64px;
      right: 0;
      height: 58px;
      display: flex;
      align-items: center;
      padding: 0 18px 0 10px;
      color: #fff;
      background:
        linear-gradient(92deg, #0f2c55 0%, #162f59 30%, #7d2632 58%, #c39142 100%);
      box-shadow: 0 2px 5px rgba(24, 49, 72, 0.32);
      z-index: 10;
    }

    .logo-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 64px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9fbfd;
      border-right: 1px solid #d7e1e8;
      box-shadow: 2px 0 4px rgba(27, 49, 70, 0.08);
      z-index: 12;
    }

    .logo {
      position: relative;
      width: 44px;
      height: 30px;
      color: #183b61;
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 32px;
    }

    .logo::before,
    .logo::after {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      transform: rotate(-18deg);
    }

    .logo::before {
      right: 0;
      top: 5px;
      border-left: 12px solid #c86b28;
    }

    .logo::after {
      right: 5px;
      top: 0;
      border-left: 10px solid #8bb0bf;
      opacity: 0.85;
    }

    .rail {
      position: absolute;
      top: 58px;
      left: 0;
      bottom: 31px;
      width: 74px;
      background: var(--rail);
      border-right: 1px solid #dce6ec;
      box-shadow: 2px 0 5px rgba(31, 56, 75, 0.08);
      z-index: 8;
    }

    .rail-items {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 23px;
      padding-top: 23px;
    }

    .rail-link {
      position: relative;
      width: 40px;
      height: 32px;
      display: grid;
      place-items: center;
      color: #8f766b;
      border-radius: 3px;
    }

    .rail-link.active {
      width: 42px;
      height: 39px;
      color: #fff;
      background: #163d73;
      box-shadow: 0 3px 6px rgba(23, 55, 92, 0.28);
    }

    .rail-link.active::before {
      content: "";
      position: absolute;
      top: 2px;
      left: -15px;
      width: 5px;
      height: 35px;
      border-radius: 0 3px 3px 0;
      background: #0e2e66;
    }

    .icon {
      width: 20px;
      height: 20px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 665px;
    }

    .chevron {
      width: 21px;
      height: 58px;
      display: grid;
      place-items: center;
      color: #d8e4ec;
    }

    .grid-app {
      width: 27px;
      height: 27px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      color: var(--gold);
    }

    .grid-app span {
      border: 2px solid currentColor;
      border-radius: 2px;
    }

    .module-title {
      margin-left: 3px;
      color: #d7dc47;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .search {
      position: relative;
      width: 470px;
      height: 36px;
      margin-left: 8px;
    }

    .search input {
      width: 100%;
      height: 100%;
      padding: 0 46px 0 44px;
      color: #e2e6ef;
      font-size: 14px;
      font-style: italic;
      font-weight: 700;
      outline: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 18px;
      background: rgba(15, 25, 52, 0.78);
      box-shadow:
        inset 0 1px 4px rgba(0, 0, 0, 0.55),
        0 1px 1px rgba(255, 255, 255, 0.14);
    }

    .search input::placeholder {
      color: #d7dce4;
      opacity: 0.8;
    }

    .search-icon {
      position: absolute;
      left: 17px;
      top: 8px;
      width: 19px;
      height: 19px;
      border: 3px solid #c1cad7;
      border-radius: 50%;
      opacity: 0.9;
    }

    .search-icon::after {
      content: "";
      position: absolute;
      right: -8px;
      bottom: -6px;
      width: 10px;
      height: 3px;
      border-radius: 3px;
      background: #c1cad7;
      transform: rotate(45deg);
    }

    .down {
      position: absolute;
      top: 12px;
      right: 17px;
      width: 9px;
      height: 9px;
      border-right: 2px solid #c4ccd8;
      border-bottom: 2px solid #c4ccd8;
      transform: rotate(45deg);
      opacity: 0.95;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 18px;
      width: 100%;
      color: #f3f1e8;
      opacity: 0.96;
    }

    .action-icon {
      width: 17px;
      height: 17px;
      color: #f1eadc;
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.25));
    }

    .flag {
      position: relative;
      width: 27px;
      height: 16px;
      display: inline-block;
      background: #d62626;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.28);
    }

    .flag::before {
      content: "★";
      position: absolute;
      left: 8px;
      top: 0;
      color: #f8db41;
      font-size: 11px;
      line-height: 16px;
    }

    .avatar {
      width: 31px;
      height: 31px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 35%, #f3f4ee 0 22%, transparent 23%),
        radial-gradient(circle at 50% 88%, #f3f4ee 0 35%, transparent 36%),
        linear-gradient(#dce6ec, #bdcdd8);
      border: 2px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 4px rgba(31, 52, 70, 0.22);
    }

    .titlebar {
      position: absolute;
      top: 58px;
      left: 74px;
      right: 0;
      height: 47px;
      display: flex;
      align-items: center;
      padding-left: 13px;
      color: #304c63;
      font-size: 14.5px;
      font-weight: 800;
      text-transform: uppercase;
      background: rgba(250, 253, 255, 0.84);
      border-bottom: 1px solid #d7e2e9;
      box-shadow: 0 1px 5px rgba(40, 61, 78, 0.1);
      z-index: 5;
    }

    .workspace {
      position: absolute;
      top: 105px;
      left: 74px;
      right: 0;
      bottom: 31px;
      padding: 18px 31px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.36), transparent 28%),
        #f3f8fb;
    }

    .columns {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      align-items: start;
    }

    .panel {
      background: rgba(227, 232, 235, 0.78);
      box-shadow:
        0 0 8px rgba(74, 99, 117, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.48);
    }

    .panel-heading {
      height: 32px;
      display: flex;
      align-items: center;
      padding: 0 9px;
      color: #eef6fb;
      font-size: 14px;
      font-weight: 800;
      background: var(--sky);
      border-bottom: 1px solid rgba(255, 255, 255, 0.25);
    }

    .panel ol {
      margin: 0;
      padding: 0 0 8px 0;
      list-style: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.22), rgba(208, 214, 218, 0.58));
    }

    .panel li {
      height: 29px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
      color: #3c4c5d;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.42);
    }

    .panel li a {
      display: flex;
      align-items: center;
      width: 100%;
      height: 100%;
      cursor: pointer;
      transition: color 120ms ease, background 120ms ease;
    }

    .panel li a:hover,
    .panel li a:focus-visible {
      color: #0f3e74;
      outline: none;
      background: rgba(255, 255, 255, 0.26);
    }

    .panel li.active {
      color: var(--active);
    }

    .num {
      width: 26px;
      flex: 0 0 26px;
      font-size: 14px;
      font-weight: 800;
    }

    .field {
      min-height: 447px;
    }

    .content {
      min-height: 119px;
    }

    .category {
      min-height: 178px;
    }

    .statusbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 31px;
      display: flex;
      align-items: center;
      gap: 17px;
      padding-left: 13px;
      color: #3e4d5b;
      font-size: 13px;
      font-weight: 700;
      background: rgba(250, 253, 255, 0.94);
      border-top: 1px solid #d9e3ea;
      box-shadow: 0 -2px 5px rgba(25, 47, 66, 0.08);
      z-index: 15;
    }

    .company {
      height: 24px;
      min-width: 232px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      color: #fff;
      background: #143d72;
      border-radius: 3px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .company svg,
    .account svg {
      width: 14px;
      height: 14px;
      flex: 0 0 14px;
    }

    .account {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      height: 24px;
    }

    @media (max-width: 1280px) {
      .top-left {
        min-width: 610px;
        gap: 14px;
      }

      .search {
        width: 420px;
      }

      .top-actions {
        gap: 13px;
      }
    }
  </style>
</head>

    const state = {
      fieldIndex: 0,
      contentIndex: 0
    };

    const fieldList = document.getElementById("field-list");
    const contentList = document.getElementById("content-list");
    const categoryList = document.getElementById("category-list");

    function createListItem(label, index, active, options) {
      const item = document.createElement("li");
      if (active) {
        item.className = "active";
      }

      const link = document.createElement("a");
      link.href = options.href;
      if (options.target) {
        link.target = options.target;
        link.rel = "noopener noreferrer";
      }
      link.addEventListener("click", options.onClick);

      const number = document.createElement("span");
      number.className = "num";
      number.textContent = `${index + 1}.`;

      const text = document.createElement("span");
      text.textContent = label;

      link.append(number, text);
      item.append(link);
      return item;
    }

    function renderFields() {
      fieldList.replaceChildren(...workflowData.map((entry, index) => {
        return createListItem(entry.field, index, index === state.fieldIndex, {
          href: "#noi-dung",
          onClick: (event) => {
            event.preventDefault();
            state.fieldIndex = index;
            state.contentIndex = 0;
            renderAll();
          }
        });
      }));
    }

    function renderContents() {
      const contents = workflowData[state.fieldIndex].contents;
      contentList.replaceChildren(...contents.map((entry, index) => {
        return createListItem(entry.name, index, index === state.contentIndex, {
          href: "#the-loai",
          onClick: (event) => {
            event.preventDefault();
            state.contentIndex = index;
            renderContents();
            renderCategories();
          }
        });
      }));
    }

    function renderCategories() {
      const categories = workflowData[state.fieldIndex].contents[state.contentIndex].categories;
      categoryList.replaceChildren(...categories.map((label, index) => {
        return createListItem(label, index, index === 0, {
          href: workflowLink,
          target: "_blank",
          onClick: () => {}
        });
      }));
    }

    function renderAll() {
      renderFields();
      renderContents();
      renderCategories();
    }

    renderAll();
